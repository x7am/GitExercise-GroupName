<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: #000;
            color: #fff;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        h1 span {
            color: #eb0505;
        }
        
        .tagline {
            color: #ccc;
            font-size: 1.1rem;
        }
        
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .info-section h2, .form-section h2 {
            color: #f10101;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .info-section p {
            color: #ddd;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }
        
        
        
        .contact-item i {
            color: #4a8cff;
            font-size: 1.5rem;
            width: 40px;
        }
       
        
        .form-section {
            background: #111;
            padding: 30px;
            border-radius: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
        }
        
        .form-control {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
            font-size: 1rem;
        }
        
        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }
        
        .btn {
            padding: 15px 30px;
            background: #730000;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #ff3a3a;
            transform: translateY(-2px);
        }
        
        .map {
            background: #222;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 40px;
        }
        
        .map i {
            font-size: 3rem;
            color: #4a8cff;
            margin-bottom: 20px;
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid #333;
            color: #ddd;
        }
        
        @media (max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Contact<span>Us</span></h1>
        <p class="tagline">We'd love to hear from you</p>
    </header>
    
    <div class="contact-container">
        <section class="info-section">
            <h2>Get In Touch</h2>
            <p>Have questions or want to discuss a project? We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
            
            
           
        
        <section class="form-section">
            <h2>Send Us a Message</h2>
            <form>
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" class="form-control" placeholder="Enter subject">
                </div>
                
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" class="form-control" placeholder="Type your message here"></textarea>
                </div>
                
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </div>
